name: Builder 👷

on:
  push:
    branches: [main]
    tags: ["*.*.*"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 9 * * 0" # Weekly
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-code:
    name: Lint Code 🧹
    runs-on: ubuntu-slim
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
      - name: Type-check
        run: npx tsc --noEmit

  lint-actions:
    name: Lint Action ⚙️
    runs-on: ubuntu-slim
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: freerangebytes/setup-actionlint@v0.1.1
      - name: Run actionlint
        run: |
          echo "::add-matcher::.github/actionlint-matcher.json"
          actionlint -color

  test:
    name: Test Config 🧪
    runs-on: ubuntu-slim
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
      - name: Validate build config
        run: node scripts/validate-build-config.cjs
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

  sentinel:
    name: Sentinel 👁️
    needs: [lint-code, lint-actions, test]
    if: always()
    runs-on: ubuntu-slim
    permissions: {}
    steps:
      - name: Check results
        run: |
          results='${{ toJSON(needs.*.result) }}'
          echo "Job results: ${results}"
          if echo "${results}" | jq -e 'any(. == "failure" or . == "cancelled")' > /dev/null 2>&1; then
            echo "One or more jobs failed or were cancelled"
            exit 1
          fi
          echo "All jobs passed"

  build:
    name: Build (${{ matrix.os }})
    needs: [sentinel]
    if: needs.sentinel.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-22.04
            targets: "--linux AppImage deb rpm"
          - os: macos
            runner: macos-latest
            targets: "--mac dmg"
          - os: windows
            runner: windows-latest
            targets: "--win nsis"
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Cache Electron and electron-builder binaries
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        run: npm ci
      - name: Install uv
        if: matrix.os == 'macos' || matrix.os == 'windows'
        uses: astral-sh/setup-uv@v5
      - name: Install RPM tools
        if: matrix.os == 'linux'
        run: sudo apt-get update && sudo apt-get install -y rpm
      - name: Set version from build
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || true)
            if [[ -z "${VERSION}" ]]; then
              VERSION="0.0.0-dev"
            else
              VERSION="${VERSION#v}"
            fi
          fi
          npm version "$VERSION" --no-git-tag-version --allow-same-version
      - name: Compile TypeScript
        run: npm run build
      - name: Build distributables
        run: npx electron-builder --publish never ${{ matrix.targets }}
        env:
          EVS_ACCOUNT_NAME: ${{ secrets.EVS_ACCOUNT_NAME }}
          EVS_PASSWD: ${{ secrets.EVS_PASSWD }}
      - name: Upload artefacts
        uses: actions/upload-artifact@v7
        with:
          name: sidra-${{ matrix.os }}
          path: |
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.dmg
            release/*.exe
          retention-days: 7

  release:
    name: Release 📦
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check release does not already exist
        run: |
          if gh release view "${{ github.ref_name }}" > /dev/null 2>&1; then
            echo "Error: release ${{ github.ref_name }} already exists" >&2
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Download all build artefacts
        uses: actions/download-artifact@v8
        with:
          path: release/
          merge-multiple: true
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.dmg
            release/*.exe
