name: Builder 👷

on:
  push:
    branches: [main]
    tags: ["*.*.*"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 9 * * 0" # Weekly
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  version-gate:
    name: Version Gate 🔖
    runs-on: ubuntu-slim
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: Validate version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$PKG_VERSION" != "$TAG_VERSION" ]]; then
            echo "Error: package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)" >&2
            exit 1
          fi
          echo "✓ Version $PKG_VERSION matches tag $TAG_VERSION"

  lint-code:
    name: Lint Code 🧹
    needs: [version-gate]
    if: always() && (needs.version-gate.result == 'success' || needs.version-gate.result == 'skipped')
    runs-on: ubuntu-slim
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
      - name: Type-check
        run: npx tsc --noEmit

  lint-actions:
    name: Lint Action ⚙️
    needs: [version-gate]
    if: always() && (needs.version-gate.result == 'success' || needs.version-gate.result == 'skipped')
    runs-on: ubuntu-slim
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: freerangebytes/setup-actionlint@v0.1.1
      - name: Run actionlint
        run: |
          echo "::add-matcher::.github/actionlint-matcher.json"
          actionlint -color

  test:
    name: Test Config 🧪
    needs: [version-gate]
    if: always() && (needs.version-gate.result == 'success' || needs.version-gate.result == 'skipped')
    runs-on: ubuntu-slim
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
      - name: Validate build config
        run: node scripts/validate-build-config.cjs
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

  sentinel:
    name: Sentinel 👁️
    needs: [lint-code, lint-actions, test]
    if: always()
    runs-on: ubuntu-slim
    permissions: {}
    steps:
      - name: Check results
        run: |
          results='${{ toJSON(needs.*.result) }}'
          echo "Job results: ${results}"
          if echo "${results}" | jq -e 'any(. == "failure" or . == "cancelled")' > /dev/null 2>&1; then
            echo "One or more jobs failed or were cancelled"
            exit 1
          fi
          echo "All jobs passed"

  build:
    name: Build (${{ matrix.os }})
    needs: [sentinel]
    if: needs.sentinel.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-22.04
            targets: "--linux AppImage deb rpm"
          - os: macos
            runner: macos-latest
            targets: "--mac dmg"
          - os: windows
            runner: windows-latest
            targets: "--win nsis"
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Cache Electron and electron-builder binaries
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        run: npm ci
      - name: Install uv
        if: matrix.os == 'macos' || matrix.os == 'windows'
        uses: astral-sh/setup-uv@v5
      - name: Install RPM tools
        if: matrix.os == 'linux'
        run: sudo apt-get update && sudo apt-get install -y rpm
      - name: Compile TypeScript
        run: npm run build
      - name: Build distributables
        run: npx electron-builder --publish never ${{ matrix.targets }}
        env:
          EVS_ACCOUNT_NAME: ${{ secrets.EVS_ACCOUNT_NAME }}
          EVS_PASSWD: ${{ secrets.EVS_PASSWD }}
      - name: Upload artefacts
        uses: actions/upload-artifact@v7
        with:
          name: sidra-${{ matrix.os }}
          path: |
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.dmg
            release/*.exe
          retention-days: 7

  release:
    name: Release 📦
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check release does not already exist
        run: |
          if gh release view "${{ github.ref_name }}" > /dev/null 2>&1; then
            echo "Error: release ${{ github.ref_name }} already exists" >&2
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Download all build artefacts
        uses: actions/download-artifact@v8
        with:
          path: release/
          merge-multiple: true
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.dmg
            release/*.exe

  nix-hash:
    name: Nix Hash 🔑
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            eval-cores = 0
      - name: Update Nix hashes 📝
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME}"

          # Fetch and hash the Linux deb
          linux_url="https://github.com/wimpysworld/sidra/releases/download/${VERSION}/Sidra-${VERSION}-linux-amd64.deb"
          echo "⬇️  Fetching Linux deb: ${linux_url}"
          linux_hash=$(nix store prefetch-file --json --hash-type sha256 "$linux_url" | jq -r '.hash')
          echo "🔑 Linux hash: ${linux_hash}"

          # Fetch and hash the Darwin dmg
          darwin_url="https://github.com/wimpysworld/sidra/releases/download/${VERSION}/Sidra-${VERSION}-mac-arm64.dmg"
          echo "⬇️  Fetching Darwin dmg: ${darwin_url}"
          darwin_hash=$(nix store prefetch-file --json --hash-type sha256 "$darwin_url" | jq -r '.hash')
          echo "🔑 Darwin hash: ${darwin_hash}"

          # Update Linux hash
          sed -i "s|hash = \"sha256-[^\"]*\"|hash = \"${linux_hash}\"|" nix/linux.nix

          # Update Darwin hash (handles both "sha256-..." and lib.fakeHash)
          sed -i "s|hash = \"sha256-[^\"]*\"|hash = \"${darwin_hash}\"|" nix/darwin.nix
          sed -i "s|hash = lib.fakeHash|hash = \"${darwin_hash}\"|" nix/darwin.nix

          echo "✅ Updated nix/linux.nix and nix/darwin.nix"
          git diff nix/linux.nix nix/darwin.nix

      - name: Create PR with hash updates 🚀
        run: |
          VERSION="${GITHUB_REF_NAME}"
          BRANCH="ci/nix-hash-${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add nix/linux.nix nix/darwin.nix
          git commit -m "chore(nix): update hashes for v${VERSION}"
          git push origin "${BRANCH}"

          PR_URL=$(gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "chore(nix): update hashes for v${VERSION}" \
            --body "Update Nix package hashes for the ${VERSION} release.")

          echo "Created PR: ${PR_URL}"
          gh pr merge "${PR_URL}" --auto --squash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
